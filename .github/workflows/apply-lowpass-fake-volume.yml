name: Apply low-pass and fake stereo gain
on:
  push:
    branches:
      - codex/fix-rapid-play-artwork-race-clean
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 tools/apply_lowpass_fake_volume.py
      - run: git diff --check
      - run: |
          rm -f tools/apply_lowpass_fake_volume.py
          rm -f .github/workflows/apply-lowpass-fake-volume.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m 'Add low-pass control and fake stereo makeup gain'
          git push origin HEAD:codex/fix-rapid-play-artwork-race-clean
