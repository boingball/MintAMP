name: Apply hardware audio filter fix
on:
  push:
    branches:
      - codex/fix-rapid-play-artwork-race-clean
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 tools/apply_hardware_filter_fix.py
      - run: |
          git diff --check
          grep -q 'ApplyHardwareAudioFilter' amiga_mp3gui.c
          grep -q 'GID_HARDWARE_FILTER' amiga_mp3gui.c
          ! grep -q -- '--low-pass' amiga_mp3dec.c
          ! grep -q -- '--low-pass' amiga_mp3gui.c
      - run: |
          rm -f tools/apply_hardware_filter_fix.py
          rm -f .github/workflows/apply-hardware-filter-fix.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m 'Use hardware audio filter toggle in MiniAMP3'
          git push origin HEAD:codex/fix-rapid-play-artwork-race-clean
