name: Fix PR469 final ownership defects

on:
  push:
    branches:
      - codex/implement-tls-lifecycle-corrections-1egenr
    paths:
      - .github/workflows/fix-pr469-ownership.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/implement-tls-lifecycle-corrections-1egenr
          fetch-depth: 0

      - name: Apply exact ownership fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("radio_stream.c")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '''    t->ctx = SSL_CTX_new(method);\n    Radio_DebugCheckExecMem("after transport SSL_CTX_new");\n    if (!t->ctx || Radio_IsMemoryPoisoned() || Radio_IsTlsPoisoned()) return -1;\n    radio_net_transport_count_ctx(t);''',
                  '''    t->ctx = SSL_CTX_new(method);\n    if (t->ctx) radio_net_transport_count_ctx(t);\n    Radio_DebugCheckExecMem("after transport SSL_CTX_new");\n    if (!t->ctx || Radio_IsMemoryPoisoned() || Radio_IsTlsPoisoned()) return -1;'''
              ),
              (
                  '''    t->ssl = SSL_new(t->ctx);\n    Radio_DebugCheckExecMem("after transport SSL_new");\n    if (!t->ssl || Radio_IsMemoryPoisoned() || Radio_IsTlsPoisoned()) return -1;\n    radio_net_transport_count_ssl(t);''',
                  '''    t->ssl = SSL_new(t->ctx);\n    if (t->ssl) radio_net_transport_count_ssl(t);\n    Radio_DebugCheckExecMem("after transport SSL_new");\n    if (!t->ssl || Radio_IsMemoryPoisoned() || Radio_IsTlsPoisoned()) return -1;'''
              ),
              (
                  '''    if (!args) {\n        t->ssl_poisoned = 1;\n        Radio_MarkTlsPoisoned("RadioNet_Close request allocation failed");\n        return;\n    }''',
                  '''    if (!args) {\n        Radio_MarkTlsPoisoned("RadioNet_Close request allocation failed");\n        return;\n    }'''
              ),
              (
                  '''        args->state = RADIO_NET_REQ_ABANDONED;\n        t->ssl_poisoned = 1;\n        radio_net_io_req_unlock(args);\n        Radio_MarkTlsPoisoned("RadioNet_Close dispatch timed out");''',
                  '''        args->state = RADIO_NET_REQ_ABANDONED;\n        radio_net_io_req_unlock(args);\n        Radio_MarkTlsPoisoned("RadioNet_Close dispatch timed out");'''
              ),
          ]

          for index, (old, new) in enumerate(replacements, 1):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"replacement {index}: expected exactly one match, found {count}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

          bash tools/check_network_ownership.sh
          git diff --check
          git diff -- radio_stream.c

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio_stream.c
          git commit -m "Fix final RadioNet ownership races"
          git push origin HEAD:codex/implement-tls-lifecycle-corrections-1egenr
