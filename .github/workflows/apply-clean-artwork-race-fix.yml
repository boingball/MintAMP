name: Apply clean artwork playback race fix

on:
  push:
    branches:
      - codex/fix-rapid-play-artwork-race-clean

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply proven source change
        run: python3 tools/apply_clean_artwork_play_race_fix.py

      - name: Validate clean source diff
        run: |
          git diff --check
          grep -q 'Rapid Browse->Play can otherwise overlap GUI artwork work' amiga_mp3gui.c
          grep -q 'artCanPump = !gui->playbackActive' amiga_mp3gui.c
          grep -q 'artCacheSavePending = 1' amiga_mp3gui.c
          grep -q 'artRestartPending' amiga_mp3gui.c
          test "$(grep -c 'apply_clean_artwork_play_race_fix' amiga_mp3gui.c || true)" -eq 0

      - name: Commit clean source change
        run: |
          rm -f tools/apply_clean_artwork_play_race_fix.py
          rm -f .github/workflows/apply-clean-artwork-race-fix.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Avoid artwork work during playback startup'
          git push origin HEAD:codex/fix-rapid-play-artwork-race-clean
