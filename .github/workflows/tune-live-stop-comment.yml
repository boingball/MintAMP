name: Refine live Stop cleanup comment

on:
  push:
    branches:
      - codex/fix-live-playback-stop

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 tools/tune_live_stop_comment.py
      - run: git diff --check
      - name: Commit
        run: |
          rm -f tools/tune_live_stop_comment.py
          rm -f .github/workflows/tune-live-stop-comment.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Clarify active Stop cleanup rationale'
          git push origin HEAD:codex/fix-live-playback-stop
